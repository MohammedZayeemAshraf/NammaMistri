# Project-wide Gradle settings.
# EXTREME MINIMALIST CONFIGURATION

# 1. Start small (-Xms128m) and cap at 512MB. 
# 2. Limit Direct Memory to 256MB to satisfy the Kotlin compiler without overwhelming the OS.
# 3. Use SerialGC for the lowest possible memory overhead.
org.gradle.jvmargs=-Xms128m -Xmx512m -XX:MaxDirectMemorySize=256m -XX:+UseSerialGC -Dfile.encoding=UTF-8

# 4. Run Kotlin inside the Gradle process to save a second JVM footprint (~500MB).
kotlin.compiler.execution.strategy=in-process

# 5. Disable background services and caching to free up every possible byte.
org.gradle.daemon=false
org.gradle.vfs.watch=false
org.gradle.configuration-cache=false
org.gradle.parallel=false
org.gradle.workers.max=1

# 6. Disable incremental compilation to avoid large memory-mapped buffers.
kotlin.incremental=false
ksp.incremental=false

# Standard Android settings
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
android.disallowKotlinSourceSets=false
